blueprint:
  name: ThamerLab Smart Irrigation
  description: Smart irrigation blueprint with notifications and flow monitoring.
  domain: automation
  source_url: https://github.com/ThamerLab/HA

  input:
    irrigation_switches:
      name: Irrigation Valves
      description: Select irrigation switches.
      selector:
        entity:
          domain: switch
          multiple: true

    flow_sensors:
      name: Flow Sensors
      description: Optional flow sensors.
      default: []
      selector:
        entity:
          domain: sensor
          multiple: true

    notify_service:
      name: Notify Service
      default: notify.notify
      selector:
        text:

    irrigation_duration:
      name: Irrigation Duration
      default: 15
      selector:
        number:
          min: 1
          max: 120
          step: 1
          mode: slider

    run_at_sunrise:
      name: Run at Sunrise
      default: true
      selector:
        boolean:

    run_at_sunset:
      name: Run at Sunset
      default: true
      selector:
        boolean:

mode: restart

variables:
  switches: !input irrigation_switches
  flows: !input flow_sensors
  duration: !input irrigation_duration

triggers:
  - trigger: sun
    event: sunrise
    id: sunrise

  - trigger: sun
    event: sunset
    id: sunset

conditions:
  - condition: template
    value_template: >
      {% if trigger.id == 'sunrise' %}
        {{ !input run_at_sunrise }}
      {% else %}
        {{ !input run_at_sunset }}
      {% endif %}

actions:
  - service: switch.turn_on
    target:
      entity_id: !input irrigation_switches

  - service: !input notify_service
    data:
      title: Irrigation Started
      message: Irrigation cycle started.

  - delay:
      minutes: 1

  - variables:
      total_flow: >
        {% set ns = namespace(total=0) %}
        {% for f in flows %}
          {% set ns.total = ns.total + (states(f) | float(0)) %}
        {% endfor %}
        {{ ns.total | round(2) }}

  - delay:
      minutes: 14

  - service: switch.turn_off
    target:
      entity_id: !input irrigation_switches

  - service: !input notify_service
    data:
      title: Irrigation Completed
      message: >
        Estimated usage: {{ ((total_flow * (duration / 60)) * 1000) | round(0) }} liters
