blueprint:
  name: "🌱 ThamerLab Smart Irrigation"
  description: >
    Smart irrigation system for Home Assistant.

    Features:
    🌅 Sunrise & sunset irrigation
    🕒 Custom daily schedule
    🔁 Repeat every X hours
    💧 Water usage estimation from live flow sensors
    🌊 Flow monitoring
    🚨 No-flow protection
    📱 Mobile notifications
    🛑 Manual stop detection

    Water usage calculation:
    total usage = total flow after one minute × irrigation duration in hours

  domain: automation
  source_url: https://github.com/ThamerLab/HA/blob/main/blueprints/automation/irrigation/smart_irrigation.yaml

  input:
    irrigation_switches:
      name: "🚿 Irrigation Valves"
      description: >
        Select one or more irrigation valves or switches.
      selector:
        entity:
          domain: switch
          multiple: true

    irrigation_duration:
      name: "⏱️ Irrigation Duration"
      description: >
        How long irrigation should run.

        Recommended:
        Grass: 5–10 minutes
        Trees: 10–20 minutes
      default: 15
      selector:
        number:
          min: 1
          max: 120
          step: 1
          unit_of_measurement: minutes
          mode: slider

    schedule_mode:
      name: "🗓️ Schedule Mode"
      description: "Choose how irrigation should start."
      default: sun
      selector:
        select:
          options:
            - label: "🌅 Sunrise & Sunset"
              value: sun
            - label: "🕒 Custom Time Once Per Day"
              value: custom
            - label: "🔁 Repeat Every X Hours"
              value: repeat

    custom_time:
      name: "🕒 Custom Time"
      description: >
        Used only when schedule mode is Custom Time Once Per Day.
      default: "06:00:00"
      selector:
        time:

    repeat_every_hours:
      name: "🔁 Repeat Every X Hours"
      description: >
        Used only when schedule mode is Repeat Every X Hours.
      default: 6
      selector:
        number:
          min: 1
          max: 24
          step: 1
          unit_of_measurement: hours
          mode: slider

    flow_sensors:
      name: "🌊 Flow Sensors"
      description: >
        Optional flow sensors used for water usage estimation and flow monitoring.

        Recommended unit: m³/h.
        The blueprint reads the selected sensors after one minute of irrigation,
        adds them together, then multiplies the total flow by the irrigation duration.
      default: []
      selector:
        entity:
          domain: sensor
          multiple: true

    enable_no_flow_protection:
      name: "🚨 Stop If No Flow Detected"
      description: >
        If enabled and flow sensors are selected, irrigation stops automatically
        when no water flow is detected after one minute.
      default: true
      selector:
        boolean:

    notify_devices:
      name: "📱 Notification Devices"
      description: >
        Select mobile app devices that should receive irrigation notifications.
      default: []
      selector:
        device:
          integration: mobile_app
          multiple: true

    enable_notifications:
      name: "🔔 Enable Notifications"
      description: >
        Send start, completion, error, and manual stop notifications.
      default: true
      selector:
        boolean:

mode: restart
max_exceeded: silent

variables:
  switches: !input irrigation_switches
  duration: !input irrigation_duration
  mode_selected: !input schedule_mode
  repeat_hours: !input repeat_every_hours
  flows: !input flow_sensors
  no_flow_protection: !input enable_no_flow_protection
  notifications_enabled: !input enable_notifications
  notify_targets: !input notify_devices

triggers:
  - trigger: sun
    event: sunrise
    id: sunrise

  - trigger: sun
    event: sunset
    id: sunset

  - trigger: time
    at: !input custom_time
    id: custom_time

  - trigger: time_pattern
    minutes: "0"
    id: repeat_check

conditions:
  - condition: template
    value_template: >
      {% if mode_selected == 'sun' %}
        {{ trigger.id in ['sunrise', 'sunset'] }}
      {% elif mode_selected == 'custom' %}
        {{ trigger.id == 'custom_time' }}
      {% elif mode_selected == 'repeat' %}
        {{ trigger.id == 'repeat_check' and (now().hour | int) % (repeat_hours | int) == 0 }}
      {% else %}
        false
      {% endif %}

actions:
  - variables:
      run_label: >
        {% if trigger.id == 'sunrise' %}
          🌅 sunrise
        {% elif trigger.id == 'sunset' %}
          🌇 sunset
        {% elif trigger.id == 'custom_time' %}
          🕒 custom time
        {% else %}
          🔁 repeat schedule
        {% endif %}

  - action: switch.turn_on
    target:
      entity_id: !input irrigation_switches

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ notifications_enabled and (notify_targets | count > 0) }}"
        sequence:
          - repeat:
              for_each: "{{ notify_targets }}"
              sequence:
                - device_id: "{{ repeat.item }}"
                  domain: mobile_app
                  type: notify
                  title: "💧 Irrigation Started"
                  message: >
                    Irrigation started using {{ run_label }}.

                    ⏱️ Duration:
                    {{ duration }} minutes

  - delay:
      minutes: 1

  - variables:
      total_flow: >
        {% set ns = namespace(total=0) %}
        {% for f in flows %}
          {% set ns.total = ns.total + (states(f) | float(0)) %}
        {% endfor %}
        {{ ns.total | round(3) }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ no_flow_protection and (flows | count > 0) and (total_flow | float(0) <= 0) }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input irrigation_switches

          - action: persistent_notification.create
            data:
              title: "🚨 Irrigation Error"
              message: "No water flow detected. Irrigation stopped automatically."

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notifications_enabled and (notify_targets | count > 0) }}"
                sequence:
                  - repeat:
                      for_each: "{{ notify_targets }}"
                      sequence:
                        - device_id: "{{ repeat.item }}"
                          domain: mobile_app
                          type: notify
                          title: "🚨 Irrigation Error"
                          message: >
                            No water flow detected.

                            Irrigation stopped automatically to prevent water waste.

          - stop: "No flow detected"

  - wait_template: >
      {% set off_count = expand(switches) | selectattr('state', 'eq', 'off') | list | count %}
      {{ off_count == (switches | count) }}
    timeout:
      minutes: "{{ [duration - 1, 0] | max }}"
    continue_on_timeout: true

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {% set off_count = expand(switches) | selectattr('state', 'eq', 'off') | list | count %}
              {{ off_count == (switches | count) }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notifications_enabled and (notify_targets | count > 0) }}"
                sequence:
                  - repeat:
                      for_each: "{{ notify_targets }}"
                      sequence:
                        - device_id: "{{ repeat.item }}"
                          domain: mobile_app
                          type: notify
                          title: "🛑 Irrigation Stopped Manually"
                          message: >
                            Irrigation was stopped before the scheduled duration ended.

          - stop: "Manual stop detected"

  - action: switch.turn_off
    target:
      entity_id: !input irrigation_switches

  - variables:
      used_m3: "{{ ((total_flow | float(0)) * ((duration | float(0)) / 60)) | round(3) }}"
      used_liters: "{{ (((total_flow | float(0)) * ((duration | float(0)) / 60)) * 1000) | round(0) }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ notifications_enabled and (notify_targets | count > 0) }}"
        sequence:
          - repeat:
              for_each: "{{ notify_targets }}"
              sequence:
                - device_id: "{{ repeat.item }}"
                  domain: mobile_app
                  type: notify
                  title: "✅ Irrigation Completed"
                  message: >
                    Irrigation completed successfully.

                    💦 Estimated Water Usage:
                    {{ used_liters }} liters
                    ({{ used_m3 }} m³)

                    🧮 Calculation:
                    {{ total_flow }} m³/h × {{ (duration | float(0) / 60) | round(2) }} h

                    🌊 Flow Sample After 1 Minute:
                    {{ total_flow }} m³/h